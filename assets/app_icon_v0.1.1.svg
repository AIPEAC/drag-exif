<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#01579B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Photo frame (background element) -->
  <rect x="86" y="86" width="340" height="260" rx="24" ry="24" fill="#E3F2FD" opacity="0.25"/>

  <!-- Mountains inside photo -->
  <polygon points="86,246 146,186 206,226 256,196 326,256 426,226 426,346 86,346" fill="#64B5F6" opacity="0.4"/>
  <polygon points="86,266 126,226 186,266 246,236 326,286 426,256 426,346 86,346" fill="#42A5F5" opacity="0.5"/>

  <!-- Sun -->
  <circle cx="296" cy="146" r="28" fill="#FFF176" opacity="0.6"/>

  <!-- EXIF Tag (prominent, centered) -->
  <rect x="56" y="186" width="400" height="140" rx="32" ry="32" fill="#FF9800"/>

  <!-- EXIF Text (large, bold) -->
  <text x="256" y="288" font-family="Arial, Helvetica, sans-serif" font-size="100" font-weight="bold" fill="white" text-anchor="middle">EXIF</text>
</svg>
