name: exifdte
description: A standalone EXIF metadata viewer powered by ExifTool.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # UI
  data_table_2: ^2.5.15

  # Window management
  window_manager: ^0.4.3
  screen_retriever: ^0.2.0

  # File operations
  file_selector: ^1.0.3
  path_provider: ^2.1.5

  # Drag & drop
  desktop_drop: ^0.5.0

  # Settings / storage
  shared_preferences: ^2.5.0

  # HTTP
  http: ^1.3.0

  # Utils
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
