name: dragexif
description: A standalone EXIF metadata viewer powered by ExifTool.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # UI
  data_table_2: ^2.5.15
  flex_color_scheme: ^8.2.0

  # Window management
  window_manager: ^0.5.1
  screen_retriever: ^0.2.0

  # File operations
  file_selector: ^1.0.3
  path_provider: ^2.1.5

  # Drag & drop
  desktop_drop: ^0.7.1

  # Settings / storage
  shared_preferences: ^2.5.0

  # HTTP
  http: ^1.3.0

  # Utils
  package_info_plus: ^10.1.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.8

msix_config:
  display_name: DragExif
  publisher_display_name: AIPEAC
  identity_name: AIPEAC.DragExif
  msix_version: 1.0.0.0
  logo_path: windows/runner/resources/app_icon.ico
  capabilities: internetClient
  execution_alias: dragexif
  install_certificate: false

flutter:
  uses-material-design: true
