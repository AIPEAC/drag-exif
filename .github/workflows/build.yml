name: Build

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Flutter version
        id: flutter-version
        run: |
          DART_CONSTRAINT=$(grep '^  sdk:' pubspec.yaml | sed 's/.*sdk: //')
          DART_VERSION=${DART_CONSTRAINT#\^}
          FLUTTER_VERSION=$(grep "^$DART_VERSION:" .flutter-versions | cut -d: -f2 | xargs)
          echo "dart=$DART_VERSION" >> $GITHUB_OUTPUT
          echo "flutter=$FLUTTER_VERSION" >> $GITHUB_OUTPUT

      - name: Cache Flutter SDK
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/flutter
          key: flutter-${{ steps.flutter-version.outputs.flutter }}-${{ runner.os }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ steps.flutter-version.outputs.flutter }}
          cache: true

      - name: Install flutter-no-debugprint-release
        run: |
          git clone https://github.com/AIPEAC/flutter-no-debugprint-release.git /tmp/ndrelease
          cd /tmp/ndrelease
          ./install.sh <<< "y"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build Linux (stripped)
        run: |
          export PATH="$HOME/.flutter-ndrelease:$PATH"
          flutter build linux --ndrelease

      - name: Package Linux build
        run: |
          echo "=== Listing build/ndrelease contents ==="
          find build/ndrelease -type d 2>/dev/null | head -30 || true
          echo "=== Packaging ==="
          cd build/ndrelease/linux/x64/release
          tar czf "$(git rev-parse --show-toplevel)/dragexif-linux.tar.gz" bundle/
          ls -la "$(git rev-parse --show-toplevel)/dragexif-linux.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragexif-linux
          path: dragexif-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Flutter version
        id: flutter-version
        shell: bash
        run: |
          DART_CONSTRAINT=$(grep '^  sdk:' pubspec.yaml | sed 's/.*sdk: //')
          DART_VERSION=${DART_CONSTRAINT#\^}
          FLUTTER_VERSION=$(grep "^$DART_VERSION:" .flutter-versions | cut -d: -f2 | xargs)
          echo "dart=$DART_VERSION" >> $GITHUB_OUTPUT
          echo "flutter=$FLUTTER_VERSION" >> $GITHUB_OUTPUT

      - name: Cache Flutter SDK
        uses: actions/cache@v4
        with:
          path: C:\\hostedtoolcache\\flutter
          key: flutter-${{ steps.flutter-version.outputs.flutter }}-${{ runner.os }}

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ steps.flutter-version.outputs.flutter }}
          cache: true

      - name: Install flutter-no-debugprint-release
        shell: bash
        run: |
          git clone https://github.com/AIPEAC/flutter-no-debugprint-release.git /tmp/ndrelease
          cd /tmp/ndrelease
          # install.sh deletes the clone on "y"; copy Windows files first
          mkdir -p "$HOME/.flutter-ndrelease"
          cp bin/flutter.bat "$HOME/.flutter-ndrelease/"
          cp bin/flutter.ps1 "$HOME/.flutter-ndrelease/"
          ./install.sh <<< "y"

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows (stripped)
        run: |
          $env:PATH = "$env:USERPROFILE\.flutter-ndrelease;" + $env:PATH
          flutter build windows --ndrelease

      - name: Stage MSIX build
        run: |
          New-Item -ItemType Directory -Force -Path build/windows/x64/runner/Release
          $src = "build/ndrelease/windows/x64/runner/Release"
          if (Test-Path $src) {
            Copy-Item -Path "$src/*" -Destination build/windows/x64/runner/Release/ -Recurse -Force
          } else {
            Write-Host "Source path $src does not exist. Trying to find Release dir..." -ForegroundColor Yellow
            $releaseDir = Get-ChildItem -Path build -Recurse -Directory -Filter "Release" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($releaseDir) {
              Write-Host "Found Release dir at: $($releaseDir.FullName)" -ForegroundColor Green
              Copy-Item -Path "$($releaseDir.FullName)/*" -Destination build/windows/x64/runner/Release/ -Recurse -Force
            } else {
              Write-Host "No Release directory found anywhere under build/" -ForegroundColor Red
              exit 1
            }
          }

      - name: Build MSIX
        run: |
          $env:PATH = "$env:USERPROFILE\.flutter-ndrelease;" + $env:PATH
          flutter pub run msix:create

      - name: Package Windows build
        run: |
          cd build/windows/x64/runner/Release
          7z a ../../../../../dragexif-windows.zip *

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragexif-windows
          path: dragexif-windows.zip

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragexif-msix
          path: build/windows/x64/runner/Release/dragexif.msix

  release:
    needs: [build-linux, build-windows]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: dragexif-linux
          path: artifacts/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: dragexif-windows
          path: artifacts/

      - name: Download MSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: dragexif-msix
          path: artifacts/

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: artifacts/*
          make_latest: true
          generate_release_notes: true

  # Microsoft Store publishing is manual:
  # 1. Wait for CI to finish
  # 2. Download dragexif.msix from GitHub Releases
  # 3. Go to Partner Center → DragExif → Packages
  # 4. Drag and drop the .msix file
